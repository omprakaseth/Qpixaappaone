    <script type="application/ld+json">

      "@context": "https://schema.org",

    <script type="application/ld+json">
    {

    </script>
    
    <style>
      :root {
        background-color: #09090b;
      }
      body {
        margin: 0;
        background-color: #09090b;
        color: white;
        overflow: hidden;
      }
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .splash-logo {
        width: 100px;
        height: 100px;
        filter: drop-shadow(0 0 15px rgba(123, 97, 255, 0.5));
        animation: splash-pulse 2s ease-in-out infinite;
      }
      .splash-circle {
        stroke-dasharray: 600;
        stroke-dashoffset: 600;
        animation: splash-draw 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      .splash-qp {
        opacity: 0;
        transform: translateY(10px);
        animation: fade-up 0.8s ease-out forwards 0.8s;
      }
      .flash-overlay {
        position: absolute;
        inset: 0;
        background: white;
        opacity: 0;
        pointer-events: none;
        z-index: 10000;
        animation: flash-anim 0.8s ease-out forwards;
      }
      @keyframes splash-draw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes fade-up {
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes flash-anim {
        0% { opacity: 0.8; }
        100% { opacity: 0; }
      }
      .splash-text {
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        margin-top: 24px;
        font-size: 28px;
        letter-spacing: 0.2em;
        opacity: 0;
        animation: fade-in 0.8s ease-out forwards 1.2s;
        text-transform: uppercase;
      }
      @keyframes fade-in {
        to { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="flash-overlay"></div>
      <svg width="100" height="100" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" class="splash-logo">
        <rect width="512" height="512" rx="100" fill="#FBFBFE" />
        <defs>
          <linearGradient id="splash-outer" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
            <stop stop-color="#4F46E5" />
            <stop offset="1" stop-color="#7B61FF" />
          </linearGradient>
          <linearGradient id="splash-inner" x1="256" y1="46" x2="256" y2="466" gradientUnits="userSpaceOnUse">
            <stop stop-color="#7B61FF" />
            <stop offset="1" stop-color="#1E1B4B" />
          </linearGradient>
        </defs>
        <circle cx="256" cy="256" r="230" fill="url(#splash-outer)" />
        <circle cx="256" cy="256" r="210" fill="url(#splash-inner)" class="splash-circle" />
        <g class="splash-qp">
          <path d="M236 240C236 201.34 204.66 170 166 170C127.34 170 96 201.34 96 240C96 278.66 127.34 310 166 310H236V400" stroke="white" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M276 240C276 201.34 307.34 170 346 170C384.66 170 416 201.34 416 240C416 278.66 384.66 310 346 310H276V400" stroke="white" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" />
        </g>
      </svg>
      <div class="splash-text">Qpixa</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Check if splash has already been shown in this session
      const hasShownSplash = sessionStorage.getItem('hasShownSplash');
      const splash = document.getElementById('splash-screen');
      
      if (hasShownSplash && splash) {
        splash.style.display = 'none';
        document.body.style.overflow = 'auto';
      } else {
        const removeSplash = () => {
          if (splash && splash.parentElement) {
            splash.style.opacity = '0';
            setTimeout(() => {
              if (splash && splash.parentElement) splash.remove();
              document.body.style.overflow = 'auto';
              sessionStorage.setItem('hasShownSplash', 'true');
            }, 600);
          }
        };

        // Remove splash screen after window loads
        window.addEventListener('load', () => {
          setTimeout(removeSplash, 2000);
        });

        // Fallback: Remove splash anyway after 5 seconds to prevent white screen if load event hangs
        setTimeout(removeSplash, 5000);
      }
    </script>
  </body>
</html>
