<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Qpixa is the premier AI creative community. Generate, share, and remix stunning AI images and videos with ease. Join thousands of artists at Qpixa." />
    <meta name="keywords" content="AI generator, text to image AI, AI video creation, digital art marketplace, Qpixa AI, creative community, AI shorts, prompt engineering" />
    <meta name="author" content="Qpixa Team" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://qpixa.in/" />
    
    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE_HERE" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:site_name" content="Qpixa" />
    <meta property="og:title" content="Qpixa - AI Image & Video Generator Community" />
    <meta property="og:description" content="Join Qpixa to create, share, and remix incredible AI-generated visual content. The hub for AI creators." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://qpixa.in/" />
    <meta property="og:image" content="https://qpixa.in/icons/pwa-icon-512-v4.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Qpixa - AI Visual Creation Hub" />
    <meta name="twitter:description" content="Design stunning AI art and videos. Share with the Qpixa community and grow your audience." />
    <meta name="twitter:image" content="https://qpixa.in/icons/pwa-icon-512-v4.png" />
    
    <!-- PWA Icons & Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/pwa-icon-192-v4.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Qpixa" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Qpixa" />
    <meta name="msapplication-TileImage" content="/icons/pwa-icon-512-v4.png" />
    
    <!-- Structured Data for Sitelinks -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Qpixa",
      "url": "/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "/marketplace?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Qpixa",
      "url": "/",
      "logo": "/icons/pwa-icon-512-v4.png",
      "sameAs": [
        "https://twitter.com/qpixa",
        "https://www.instagram.com/qpixa"
      ]
    }
    </script>
    
    <title>Qpixa - AI Image & Video Generator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
