    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .splash-logo {
        width: 120px;
        height: auto;
        filter: drop-shadow(0 0 15px rgba(123, 97, 255, 0.5));
        animation: splash-pulse 2s ease-in-out infinite;
      }
      .splash-path {
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        animation: splash-draw 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards, splash-glow 2s ease-in-out infinite 1.5s;
      }
      .flash-overlay {
        position: absolute;
        inset: 0;
        background: white;
        opacity: 0;
        pointer-events: none;
        z-index: 10000;
        animation: flash-anim 0.8s ease-out forwards;
      }
      @keyframes splash-draw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes splash-glow {
        0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.4)); }
        50% { filter: drop-shadow(0 0 25px rgba(123, 97, 255, 0.8)); }
      }
      @keyframes flash-anim {
        0% { opacity: 0.8; }
        100% { opacity: 0; }
      }
      .splash-text {
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 700;
        margin-top: 24px;
        font-size: 32px;
        letter-spacing: -0.02em;
        opacity: 0;
        animation: fade-in 0.8s ease-out forwards 0.5s;
      }
      @keyframes fade-in {
        to { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="flash-overlay"></div>
      <svg width="130" height="80" viewBox="0 0 130 80" fill="none" xmlns="http://www.w3.org/2000/svg" class="splash-logo">
        <defs>
          <linearGradient id="splash-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00E5FF" />
            <stop offset="100%" stop-color="#7B61FF" />
          </linearGradient>
        </defs>
        <path 
          d="M 62 70 V 40 A 18 18 0 1 0 26 40 A 18 18 0 0 0 62 40 C 62 32 68 32 68 40 A 18 18 0 0 1 104 40 A 18 18 0 1 1 68 40 V 70"
          stroke="url(#splash-gradient)"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="splash-path"
        />
      </svg>
      <h1 class="splash-text">Qpixa</h1>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Check if splash has already been shown in this session
      const hasShownSplash = sessionStorage.getItem('hasShownSplash');
      const splash = document.getElementById('splash-screen');
      
      if (hasShownSplash && splash) {
        splash.style.display = 'none';
        document.body.style.overflow = 'auto';
      } else {
        // Remove splash screen after a short delay or when window loads
        window.addEventListener('load', () => {
          setTimeout(() => {
            if (splash) {
              splash.style.opacity = '0';
              setTimeout(() => {
                splash.remove();
                document.body.style.overflow = 'auto';
                sessionStorage.setItem('hasShownSplash', 'true');
              }, 600);
            }
          }, 2000); // Increased delay to show the animation
        });
      }
    </script>
  </body>
