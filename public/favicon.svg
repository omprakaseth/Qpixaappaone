<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft White Rounded Square -->
  <rect width="512" height="512" rx="100" fill="#FBFBFE" />
  
  <!-- Outer Blue/Purple Gradient Circle -->
  <circle cx="256" cy="256" r="230" fill="url(#outer_grad)" />
  <circle cx="256" cy="256" r="222" stroke="white" stroke-width="4" stroke-opacity="0.2" />
  
  <!-- Inner Logo Circle with Deep Gradient -->
  <circle cx="256" cy="256" r="210" fill="url(#inner_grad)" />
  
  <!-- "qp" Letters in White -->
  <g filter="url(#glow)">
    <path d="M236 240C236 201.34 204.66 170 166 170C127.34 170 96 201.34 96 240C96 278.66 127.34 310 166 310H236V400" stroke="white" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M276 240C276 201.34 307.34 170 346 170C384.66 170 416 201.34 416 240C416 278.66 384.66 310 346 310H276V400" stroke="white" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <defs>
    <linearGradient id="outer_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5" />
      <stop offset="1" stop-color="#7B61FF" />
    </linearGradient>
    <linearGradient id="inner_grad" x1="256" y1="46" x2="256" y2="466" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7B61FF" />
      <stop offset="1" stop-color="#1E1B4B" />
    </linearGradient>
    <filter id="glow" x="66" y="140" width="380" height="290" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>
